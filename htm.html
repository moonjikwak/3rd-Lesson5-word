<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3과 단어 놀이터</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap');
  :root{
    --bg:#eef6f6; --card:#fff; --ink:#2c3e44; --muted:#6b8a90; --line:#d7ebe9;
    --teal:#19a6b8; --teal-d:#0e8294;
    --amber:#f4a800; --amber-d:#cf8c00;
    --pink:#e5577f; --pink-d:#c43e66;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ font-family:'Nunito',sans-serif; color:var(--ink);
    background:radial-gradient(circle at 12% 12%,#d3f0ee 0,transparent 42%),radial-gradient(circle at 88% 88%,#ffe7c9 0,transparent 42%),var(--bg);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:18px; }
  .wrap{ width:100%; max-width:460px; }
  h1,.name,.go{ font-family:'Fredoka',sans-serif; }

  header{ text-align:center; margin-bottom:22px; }
  .bfly{ font-size:46px; animation:flutter 2.6s ease-in-out infinite; }
  @keyframes flutter{ 0%,100%{ transform:translateY(0) rotate(-4deg);} 50%{ transform:translateY(-8px) rotate(4deg);} }
  header h1{ font-size:34px; font-weight:700; margin-top:4px; color:var(--ink); }
  header .sub{ font-size:15px; font-weight:700; color:var(--muted); margin-top:6px; }

  .game-card{ display:flex; align-items:center; gap:14px; text-decoration:none; color:inherit;
    background:var(--card); border:3px solid var(--line); border-radius:22px; padding:18px 18px;
    margin-bottom:14px; box-shadow:0 8px 0 var(--line); transition:transform .1s, box-shadow .1s; }
  .game-card:active{ transform:translateY(5px); box-shadow:0 3px 0 var(--line); }
  .icon{ width:58px; height:58px; flex:0 0 58px; display:flex; align-items:center; justify-content:center;
    font-size:30px; border-radius:18px; }
  .texts{ flex:1; display:flex; flex-direction:column; gap:3px; }
  .name{ font-size:22px; font-weight:700; }
  .desc{ font-size:14px; font-weight:700; color:var(--muted); line-height:1.3; }
  .go{ font-size:22px; font-weight:700; }

  .teal  .icon{ background:#dcf3f1; } .teal  .name,.teal  .go{ color:var(--teal-d); } .teal:hover{ border-color:var(--teal); }
  .amber .icon{ background:#fdeecb; } .amber .name,.amber .go{ color:var(--amber-d); } .amber:hover{ border-color:var(--amber); }
  .pink  .icon{ background:#fcdde6; } .pink  .name,.pink  .go{ color:var(--pink-d); } .pink:hover{ border-color:var(--pink); }

  .foot{ text-align:center; font-size:13px; font-weight:700; color:var(--muted); margin-top:10px; line-height:1.6; }
</style>

<div class="wrap">
  <header>
    <div class="bfly">🦋</div>
    <h1>3과 단어 놀이터</h1>
    <p class="sub">Do you like ~? · 하고 싶은 놀이를 골라요</p>
  </header>

  <a class="game-card teal" href="3학년_Lesson5_단어짝맞추기.html">
    <span class="icon">🧩</span>
    <span class="texts"><span class="name">그림 매칭</span><span class="desc">단어와 그림을 연결해요</span></span>
    <span class="go">▶</span>
  </a>

  <a class="game-card amber" href="3학년_Lesson5_카드뒤집기.html">
    <span class="icon">🃏</span>
    <span class="texts"><span class="name">카드 뒤집기</span><span class="desc">뒤집어서 같은 짝을 찾아요</span></span>
    <span class="go">▶</span>
  </a>

  <a class="game-card pink" href="3학년_Lesson5_단어타이핑.html">
    <span class="icon">⌨️</span>
    <span class="texts"><span class="name">단어 타이핑</span><span class="desc">듣고 영어 철자를 입력해요</span></span>
    <span class="go">▶</span>
  </a>

  <p class="foot">완주하면 애벌레가 한 단계 자라요 🌱<br>모이면 나비가 되어 우리 반 정원으로 날아가요 🦋</p>
</div>
